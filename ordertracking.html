<!DOCTYPE html>
<html>
<head>
<title>Track Order | Verdora</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top-header">
  <div class="logo">Verdora</div>

  <div class="search-box">
    <input type="text" placeholder="Search vegetables, fruits, pulses...">
    <button>Search</button>
  </div>

  <div class="nav-icons">
    <span>Orders</span>
    <span>Wallet</span>
    <span>Profile</span>
  </div>
</header>


<div class="page">

<div class="order-left">
  <h2>Order ID: VD34211</h2>

  <div class="timeline">
    <div class="active">Order Placed</div>
    <div class="active">Packed</div>
    <div class="active">Out for Delivery</div>
    <div>Delivered</div>
  </div>

  <p><b>Delivery Partner:</b> Ravi</p>
  <p><b>ETA:</b> 20 mins</p>
</div>

<div class="order-right">
  <h3>Live Tracking</h3>
  <div class="map">Map View</div>
</div>

</div>
</body>
</html>
